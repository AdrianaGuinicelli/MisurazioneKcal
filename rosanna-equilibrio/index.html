<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rosanna in Equilibrio</title>
  <style>
    :root {
      --primary: #6FA8DC;
      --secondary: #A8D5BA;
      --bg: #F9FAF7;
      --card: #FFFFFF;
      --text: #2F3A45;
      --muted: #6B7280;
      --border: #E5E7EB;
      --success: #4CAF7A;
      --shadow: 0 8px 24px rgba(0,0,0,0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px 16px 100px;
    }

    .header {
      background: linear-gradient(135deg, var(--primary), #8dc3ee);
      color: white;
      padding: 22px 18px;
      border-radius: 22px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .header p {
      margin: 0;
      font-size: 16px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .tab-btn {
      border: none;
      background: white;
      color: var(--text);
      padding: 14px 10px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: bold;
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    .tab-btn.active {
      background: var(--secondary);
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }

    .card h2, .card h3 {
      margin-top: 0;
    }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .metric {
      background: #f8fbff;
      border: 1px solid #dbeafe;
      border-radius: 16px;
      padding: 14px;
    }

    .metric .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .metric .value {
      font-size: 24px;
      font-weight: bold;
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 16px;
      background: white;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      width: 100%;
      border: none;
      padding: 15px 16px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 6px;
      background: var(--primary);
      color: white;
    }

    .btn.secondary {
      background: var(--secondary);
      color: var(--text);
    }

    .status {
      padding: 12px 14px;
      border-radius: 14px;
      margin-bottom: 12px;
      display: none;
      font-size: 14px;
    }

    .status.show {
      display: block;
    }

    .status.success {
      background: #edfdf3;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .status.error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .history-item, .suggestion {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 10px;
      background: #fff;
    }

    .small-text {
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .metrics, .grid-2, .tabs {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Rosanna in Equilibrio</h1>
      <p>Un aiuto semplice per seguire alimentazione, attività e obiettivi.</p>
    </div>

    <div id="statusBox" class="status"></div>

    <div class="tabs">
      <button class="tab-btn active" onclick="showSection('home', this)">Home</button>
      <button class="tab-btn" onclick="showSection('food', this)">Alimento</button>
      <button class="tab-btn" onclick="showSection('activity', this)">Attività</button>
      <button class="tab-btn" onclick="showSection('history', this)">Storico</button>
    </div>

    <section id="home" class="section active">
      <div class="card">
        <h2>Riepilogo di oggi</h2>
        <div class="metrics">
          <div class="metric">
            <div class="label">Kcal assunte</div>
            <div id="todayCalories" class="value">0</div>
          </div>
          <div class="metric">
            <div class="label">Kcal attività</div>
            <div id="todayBurned" class="value">0</div>
          </div>
          <div class="metric">
            <div class="label">Mantenimento</div>
            <div id="maintenanceCalories" class="value">1700</div>
          </div>
          <div class="metric">
            <div class="label">Obiettivo</div>
            <div id="goalCalories" class="value">1440</div>
          </div>
          <div class="metric">
            <div class="label">Proteine</div>
            <div id="todayProteins" class="value">0 g</div>
          </div>
          <div class="metric">
            <div class="label">Carboidrati</div>
            <div id="todayCarbs" class="value">0 g</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>Suggerimenti</h3>
        <button class="btn secondary" onclick="loadSuggestions()">Suggeriscimi cosa mangiare</button>
        <div id="suggestionsBox" style="margin-top:14px;"></div>
      </div>
    </section>

    <section id="food" class="section">
      <div class="card">
        <h2>Aggiungi alimento</h2>

        <div class="field">
          <label for="foodName">Alimento</label>
          <input id="foodName" type="text" placeholder="Es. mela" />
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="foodQuantity">Quantità (g)</label>
            <input id="foodQuantity" type="number" placeholder="Es. 150" />
          </div>
          <div class="field">
            <label for="mealType">Pasto</label>
            <select id="mealType">
              <option value="colazione">Colazione</option>
              <option value="spuntino_mattutino">Spuntino mattutino</option>
              <option value="pranzo">Pranzo</option>
              <option value="spuntino_pomeridiano">Spuntino pomeridiano</option>
              <option value="cena">Cena</option>
              <option value="extra">Extra</option>
            </select>
          </div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="foodDate">Data</label>
            <input id="foodDate" type="date" />
          </div>
          <div class="field">
            <label for="foodTime">Ora</label>
            <input id="foodTime" type="time" />
          </div>
        </div>

        <button class="btn" onclick="saveFood()">Salva alimento</button>
      </div>
    </section>

    <section id="activity" class="section">
      <div class="card">
        <h2>Aggiungi attività</h2>

        <div class="field">
          <label for="activityType">Attività</label>
          <select id="activityType">
            <option value="camminata_lenta">Camminata lenta</option>
            <option value="camminata_moderata">Camminata moderata</option>
            <option value="camminata_sostenuta">Camminata sostenuta</option>
            <option value="ginnastica_leggera">Ginnastica leggera</option>
          </select>
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="activityDuration">Durata (minuti)</label>
            <input id="activityDuration" type="number" placeholder="Es. 20" />
          </div>
          <div class="field">
            <label for="activityIntensity">Intensità</label>
            <select id="activityIntensity">
              <option value="lieve">Lieve</option>
              <option value="moderata">Moderata</option>
              <option value="sostenuta">Sostenuta</option>
            </select>
          </div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="activityDate">Data</label>
            <input id="activityDate" type="date" />
          </div>
          <div class="field">
            <label for="activityTime">Ora</label>
            <input id="activityTime" type="time" />
          </div>
        </div>

        <button class="btn secondary" onclick="saveActivity()">Salva attività</button>
      </div>
    </section>

    <section id="history" class="section">
      <div class="card">
        <h2>Storico di oggi</h2>
        <button class="btn secondary" onclick="loadHistory()">Aggiorna storico</button>
        <div id="historyBox" style="margin-top:14px;"></div>
      </div>
    </section>
  </div>

  <script>
    const API_BASE = "INCOLLA_QUI_URL";

    function todayISODate() {
      const d = new Date();
      return d.toISOString().split('T')[0];
    }

    function currentTimeHHMM() {
      const d = new Date();
      return d.toTimeString().slice(0, 5);
    }

    function initDefaults() {
      document.getElementById('foodDate').value = todayISODate();
      document.getElementById('foodTime').value = currentTimeHHMM();
      document.getElementById('activityDate').value = todayISODate();
      document.getElementById('activityTime').value = currentTimeHHMM();
    }

    function showSection(sectionId, clickedBtn = null) {
      document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
      document.getElementById(sectionId).classList.add('active');

      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      if (clickedBtn) clickedBtn.classList.add('active');
    }

    function showStatus(message, type = 'success') {
      const box = document.getElementById('statusBox');
      box.textContent = message;
      box.className = `status show ${type}`;
      setTimeout(() => {
        box.className = 'status';
      }, 3500);
    }

    async function apiRequest(action, payload = {}) {
      if (!API_BASE || API_BASE === "INCOLLA_QUI_URL") {
        throw new Error('Inserisci l’URL del tuo Google Apps Script in API_BASE.');
      }

      const response = await fetch(API_BASE, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, ...payload })
      });

      const text = await response.text();

      try {
        return JSON.parse(text);
      } catch (err) {
        throw new Error('Risposta non valida dal server: ' + text);
      }
    }

    async function loadDashboard() {
      try {
        const res = await apiRequest('getDashboard', { date: todayISODate() });
        const data = res.data || {};

        document.getElementById('todayCalories').textContent = Math.round(data.totalKcalIn || 0);
        document.getElementById('todayBurned').textContent = Math.round(data.totalKcalOut || 0);
        document.getElementById('maintenanceCalories').textContent = Math.round(data.maintenanceKcal || 1700);
        document.getElementById('goalCalories').textContent = Math.round(data.goalKcal || 1440);
        document.getElementById('todayProteins').textContent = Math.round(data.proteinG || 0) + ' g';
        document.getElementById('todayCarbs').textContent = Math.round(data.carbsG || 0) + ' g';
      } catch (error) {
        showStatus(error.message, 'error');
      }
    }

    async function saveFood() {
      const foodName = document.getElementById('foodName').value.trim();
      const quantity = Number(document.getElementById('foodQuantity').value);
      const mealType = document.getElementById('mealType').value;
      const date = document.getElementById('foodDate').value;
      const time = document.getElementById('foodTime').value;

      if (!foodName || !quantity || !date || !time) {
        showStatus('Compila tutti i campi dell’alimento.', 'error');
        return;
      }

      try {
        const res = await apiRequest('saveFood', {
          foodName,
          quantity,
          mealType,
          date,
          time
        });

        showStatus(res.message || 'Alimento salvato con successo.');
        document.getElementById('foodName').value = '';
        document.getElementById('foodQuantity').value = '';
        await loadDashboard();
        await loadHistory();
      } catch (error) {
        showStatus(error.message, 'error');
      }
    }

    async function saveActivity() {
      const activityType = document.getElementById('activityType').value;
      const durationMinutes = Number(document.getElementById('activityDuration').value);
      const intensity = document.getElementById('activityIntensity').value;
      const date = document.getElementById('activityDate').value;
      const time = document.getElementById('activityTime').value;

      if (!activityType || !durationMinutes || !date || !time) {
        showStatus('Compila tutti i campi dell’attività.', 'error');
        return;
      }

      try {
        const res = await apiRequest('saveActivity', {
          activityType,
          durationMinutes,
          intensity,
          date,
          time
        });

        showStatus(res.message || 'Attività salvata con successo.');
        document.getElementById('activityDuration').value = '';
        await loadDashboard();
        await loadHistory();
      } catch (error) {
        showStatus(error.message, 'error');
      }
    }

    async function loadSuggestions() {
      const box = document.getElementById('suggestionsBox');
      box.innerHTML = '<p class="small-text">Sto preparando i suggerimenti...</p>';

      try {
        const res = await apiRequest('getSuggestions', {
          date: todayISODate(),
          time: currentTimeHHMM()
        });

        const suggestions = res.data?.suggestions || [];

        if (!suggestions.length) {
          box.innerHTML = '<p class="small-text">Nessun suggerimento disponibile.</p>';
          return;
        }

        box.innerHTML = suggestions.map(item => `
          <div class="suggestion">
            <strong>${item.title || 'Suggerimento'}</strong><br>
            ${item.description || ''}<br>
            <span class="small-text">
              ${item.kcal ? `Kcal stimate: ${item.kcal}` : ''}
              ${item.macros ? ` · Macro: ${item.macros}` : ''}
            </span>
          </div>
        `).join('');
      } catch (error) {
        box.innerHTML = '';
        showStatus(error.message, 'error');
      }
    }

    async function loadHistory() {
      const box = document.getElementById('historyBox');
      box.innerHTML = '<p class="small-text">Carico lo storico...</p>';

      try {
        const res = await apiRequest('getHistory', { date: todayISODate() });
        const foodLogs = res.data?.foodLogs || [];
        const activityLogs = res.data?.activityLogs || [];

        if (!foodLogs.length && !activityLogs.length) {
          box.innerHTML = '<p class="small-text">Nessun inserimento per oggi.</p>';
          return;
        }

        let html = '';

        if (foodLogs.length) {
          html += '<h3>Alimenti</h3>';
          html += foodLogs.map(item => `
            <div class="history-item">
              <strong>${item.time || ''} - ${item.foodName || ''}</strong><br>
              Quantità: ${item.quantity || 0} g<br>
              Kcal: ${Math.round(item.kcal || 0)}<br>
              Macro: P ${Math.round(item.protein || 0)}g · C ${Math.round(item.carbs || 0)}g · G ${Math.round(item.fat || 0)}g<br>
              Pasto: ${item.mealType || '-'}
            </div>
          `).join('');
        }

        if (activityLogs.length) {
          html += '<h3>Attività</h3>';
          html += activityLogs.map(item => `
            <div class="history-item">
              <strong>${item.time || ''} - ${item.activityType || ''}</strong><br>
              Durata: ${item.durationMinutes || 0} minuti<br>
              Intensità: ${item.intensity || '-'}<br>
              Kcal consumate: ${Math.round(item.kcalBurned || 0)}
            </div>
          `).join('');
        }

        box.innerHTML = html;
      } catch (error) {
        box.innerHTML = '';
        showStatus(error.message, 'error');
      }
    }

    window.addEventListener('load', async () => {
      initDefaults();
      await loadDashboard();
      await loadHistory();
    });
  </script>
</body>
</html>
