<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test Rosanna</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f7fafc; }
    button { padding: 12px 16px; margin: 8px 0; border: none; border-radius: 10px; cursor: pointer; background: #6FA8DC; color: white; }
    pre { background: white; padding: 16px; border-radius: 12px; border: 1px solid #ddd; white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <h1>Test collegamento Rosanna</h1>

  <button onclick="testPing()">Test Ping</button>
  <button onclick="testDashboard()">Test Dashboard Oggi</button>
  <button onclick="testHistory()">Test History Oggi</button>

  <h2>Risultato</h2>
  <pre id="output">Nessun test eseguito.</pre>

  <script>
    const API_BASE = "INCOLLA_QUI_URL";

    function todayISODate() {
      const d = new Date();
      return d.toISOString().split('T')[0];
    }

    async function apiRequest(action, payload = {}) {
      const response = await fetch(API_BASE, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, ...payload })
      });

      const text = await response.text();

      try {
        return JSON.parse(text);
      } catch (e) {
        throw new Error("Risposta non JSON: " + text);
      }
    }

    function print(data) {
      document.getElementById('output').textContent = JSON.stringify(data, null, 2);
    }

    async function testPing() {
      try {
        const res = await apiRequest('ping', {});
        print(res);
      } catch (e) {
        print({ error: e.message });
      }
    }

    async function testDashboard() {
      try {
        const res = await apiRequest('getDashboard', { date: todayISODate() });
        print(res);
      } catch (e) {
        print({ error: e.message });
      }
    }

    async function testHistory() {
      try {
        const res = await apiRequest('getHistory', { date: todayISODate() });
        print(res);
      } catch (e) {
        print({ error: e.message });
      }
    }
  </script>
</body>
</html>
